  points:[
    {title:"The Audio Priority Rule",body:"Viewers will tolerate shaky video. They will not tolerate unclear audio.\n\nIf they cannot hear you clearly in the first 3 seconds, they swipe. No algorithm can save you from bad audio.\n\nAudio quality is the most underrated upgrade you can make."},
    {title:"Free Audio Fixes",body:"Right now, for free:\n- Film in a small room (bathrooms have great acoustics — seriously)\n- Close doors and windows (cut background noise)\n- Put your phone 12-18 inches from your face (not too close, not arm's length away)\n- Record a test clip and listen back with headphones before filming\n\nThose four things cost nothing and fix 80% of audio problems."},
    {title:"Budget Upgrade: Clip-On Mic",body:"A clip-on lavalier mic: $15-25 on Amazon.\n\nThis is the single best audio investment for mobile creators. Clips to your shirt, plugs into your phone, sounds like a podcast.\n\nIf you upgrade one thing this month, make it a $20 lav mic."}
  ],
  tip:"Record 10 seconds, put your headphones in, listen back. Do this BEFORE every filming session. Fix it before you film 30 videos in bad audio.",
  workshop:{title:"Audio Quality Check",prompt:"Film a 30-second clip, listen back with headphones, fix the issues, then film again and compare.\n>> What audio issues did you hear the first time?\n>> What three things did you do to improve it?\n>> How did your audio quality improve after the fixes?"}
},
"c3m3":{
  intro:{headline:"The Batch Filming System for Moms",sub:"Stop creating content every day. Batch it, and take your weekends back."},
  points:[
    {title:"Why Batch Filming Changes Everything",body:"Creating content daily is exhausting and unsustainable. It leads to burnout, inconsistency, and eventually quitting.\n\nBatch filming — recording multiple videos in one session — is how creators stay consistent without losing their minds.\n\nOne 2-hour Sunday session = 2 weeks of content."},
    {title:"The Simple Batch System",body:"Step 1: Choose your 7-14 ideas in advance (use your Hook Vault)\nStep 2: Set up your one filming spot\nStep 3: Get into hair/makeup once\nStep 4: Film all videos back to back — you can change outfits between\nStep 5: Edit later, or schedule editing time separately\n\nThat's it. Rinse and repeat monthly."},
    {title:"Batch Filming Tips for Moms",body:"- Film during nap time, after bedtime, or trade off with a partner\n- Have your scripts or bullet points ready before you press record\n- Give yourself permission to re-do takes — batch filming is efficient, not perfect\n- Film in outfits that can be swapped quickly so it looks like different days"}
  ],
  tip:"The moms who stay consistent are not the ones with the most time. They are the ones with the best systems. Build the system.",
  workshop:{title:"Plan Your First Batch Filming Day",prompt:"Fill in your batch filming plan then put it in your calendar right now. Post it to the circle!\n>> Date and time I will batch film\n>> Who is watching the kids\n>> My filming location\n>> My 7 video ideas for that session"}
},
// ── COURSE 4: Canva / Media Kit ──
"c4m0":{
  intro:{headline:"Why You Need a Media Kit",sub:"A media kit is your business card, resume, and portfolio all in one. Brands expect it.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"What a Media Kit Is",body:"A media kit is a 1-2 page visual document you send to brands when pitching.\n\nIt includes: your bio, your niche, your audience stats, your platforms, past collaborations, and your rates.\n\nBrands receive hundreds of pitches. A professional media kit instantly separates you from the crowd."},
    {title:"When Do You Need One?",body:"You need a media kit BEFORE you start pitching brands.\n\nYou can create one at:\n- 0 followers (for UGC work)\n- 500 followers (micro-influencer pitches)\n- 5,000+ followers (full influencer campaigns)\n\nHaving it ready means never missing an opportunity because you were not prepared."},
    {title:"The Canva Advantage",body:"You do not need a designer. Canva has free media kit templates that look professional.\n\nBrands cannot tell the difference between a Canva media kit and one made by a graphic designer — and they don't care.\n\nWhat they care about: does this creator look professional and organized?"}
  ],
  tip:"A media kit is not just a document — it is proof that you take your business seriously. Brands notice that immediately.",
  workshop:{title:"Media Kit Audit",prompt:"Before building your media kit, take stock of what you have.\n>> What platforms am I on and what are my current stats?\n>> What are my top 3 performing pieces of content?\n>> What makes my content unique and valuable to brands?"}
},
"c4m1":{
  intro:{headline:"Designing Your Media Kit in Canva",sub:"Step-by-step: from blank canvas to a media kit brands will love."},
  points:[
    {title:"Start With a Template",body:"Go to Canva.com → search 'Media Kit' → choose a clean, professional template.\n\nPick one that matches your brand colors (or closest to them). You will customize everything.\n\nDo NOT start from scratch. Templates save hours and the result looks better."},
    {title:"Page 1: Who You Are",body:"Your cover page should have:\n✓ A great photo of you (professional or high-quality casual)\n✓ Your name + handle\n✓ Your niche tagline\n✓ Your brand colors\n\nThis is your first impression. Make it feel like YOU. Warm, inviting, professional."},
    {title:"Page 2: Your Stats + Story",body:"Include:\n✓ Follower counts across all platforms\n✓ Average engagement rate (likes + comments ÷ followers × 100)\n✓ Your audience demographics (age, location if you know it)\n✓ A short 3-4 sentence bio that tells your story\n✓ 2-3 screenshots of your best performing content"}
  ],
  tip:"Brands look at engagement rate, not follower count. A creator with 2K followers and 12% engagement is more valuable to most brands than one with 20K and 1%. Know your numbers.",
  workshop:{title:"Build Page 1 of Your Media Kit",prompt:"Open Canva right now and start your media kit cover page. Post a screenshot to the circle!\n>> My niche tagline: I help [who] do [what]\n>> My brand colors that feel like me\n>> One word that describes the look I want for my media kit"}
},
"c4m2":{
  intro:{headline:"Stats, Rates, and Past Work",sub:"The numbers that make brands say yes."},
  points:[
    {title:"How to Calculate Your Engagement Rate",body:"Formula: (Total likes + comments on a post) ÷ Followers × 100\n\nExample: 200 likes + 30 comments = 230 ÷ 2000 followers × 100 = 11.5% engagement\n\nAverage is 1-3%. Above 5% is strong. Above 8% is exceptional.\n\nIf you have strong engagement, LEAD with that number."},
    {title:"Setting Your Rates",body:"Starting rates for creators (adjust up as you grow):\n\n- UGC content (no posting): $150-400 per video\n- Instagram Story: $100-300\n- Instagram Feed Post: $200-500\n- TikTok Video: $200-600\n- Full Package (multiple posts): negotiate\n\nNever accept free product as payment once you have an audience. Your content has value."},
    {title:"What to Include as Past Work",body:"Even if you have not worked with brands yet, include:\n✓ 3 screenshots of your best content\n✓ Any stats on those posts (views, saves, shares)\n✓ Testimonials if you have them\n✓ Niches you have covered\n\nNo brand work yet? Do 2-3 mock brand posts for products you already own. Add those."}
  ],
  tip:"Never apologize for your rates. Never negotiate against yourself before a brand even responds. Send your rates with confidence.",
  workshop:{title:"Calculate Your Numbers",prompt:"Calculate your numbers right now and build your rate card.\n>> My average engagement rate (likes+comments divided by followers times 100)\n>> My starter rate for a single post\n>> My starter rate for a UGC video (no posting required)"}
},
"c4m3":{
  intro:{headline:"Finishing and Sending Your Media Kit",sub:"A media kit that never gets sent is just a pretty document. Let's change that."},
  points:[
    {title:"Final Checklist Before You Export",body:"Before you export:\n✓ Spelling and grammar check (especially your name and handles!)\n✓ All links and handles are correct\n✓ Photo quality is clear (not blurry)\n✓ Colors are consistent\n✓ Your contact email is visible\n\nExport as PDF (not editable) — looks professional, easy to send."},
    {title:"How to Send It",body:"When emailing a brand:\n\nSubject: [Your Name] — Creator Partnership Inquiry\nEmail: Short intro, why you love the brand, what you offer.\nAttachment: Your media kit PDF\n\nKeep the email to 4-6 sentences. Brands receive hundreds of pitches — clear and concise wins."},
    {title:"Where to Find Brands to Pitch",body:"Start with brands you already USE and LOVE:\n\n1. Tag them in organic content first (get on their radar)\n2. Find their email on their website (usually press@ or partnerships@)\n3. DM them on Instagram as a backup\n4. Use platforms like Collabstr or Aspire to be discovered\n\nWarm pitches (brands you already use) have a much higher success rate."}
  ],
  tip:"Send 5 pitches this week. Just 5. Not perfect pitches — real pitches. The first yes changes everything.",
  workshop:{title:"Send Your First Pitch",prompt:"Write your 4-sentence pitch email right now. Then send it.\n>> The brand I am pitching and why I love them specifically\n>> My 4-sentence pitch email draft\n>> When I will send it (be specific with date and time)"}
},
// ── COURSE 5: Content That Converts ──
"c5m0":{
  intro:{headline:"The 3-Second Hook Formula",sub:"You have 3 seconds to stop the scroll. Here is exactly how.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"Why the First 3 Seconds Win or Lose",body:"TikTok and Reels decide in the first 3 seconds whether to push your content to more people.\n\nIf viewers swipe away immediately — the algorithm buries it.\nIf they watch past 3 seconds — the algorithm pushes it to more.\n\nYour hook is the most important part of every single video."},
    {title:"The Hook Formula",body:"The best hooks do one of three things:\n\n1. Create CURIOSITY: 'The one thing I wish someone told me before I had kids...'\n2. Make a BOLD CLAIM: 'I grew from 0 to 10K followers doing this one thing'\n3. Speak DIRECTLY to pain: 'If you're a tired mom who can't find time to post — watch this'\n\nTest all three. See what your audience responds to."},
    {title:"The First Line Rule",body:"Your very first line (spoken or on screen) is your hook.\n\nDo NOT start with:\n✗ 'Hey guys, so today I wanted to...'\n✗ 'Okay so this is kind of a random video but...'\n\nStart IN the middle of something interesting.\n✓ 'Nobody talks about how hard it is to...'\n✓ 'I made this mistake for 2 years and it cost me...' "}
  ],
  tip:"Rewatch your last 10 videos. Count how many start with a real hook in the first 3 seconds. Then rewatch someone you admire. See the difference.",
  workshop:{title:"Write 5 Hooks for Your Next Post",prompt:"Write 5 hooks for your next post right now. Post the strongest one in the circle for feedback!\n>> Your curiosity hook\n>> Your bold claim hook\n>> Your pain point hook\n>> Your personal story hook\n>> Which one feels strongest and why"}
},
"c5m1":{
  intro:{headline:"Script Structure That Keeps People Watching",sub:"Most creators lose 50% of viewers in the first 15 seconds. Here's how not to."},
  points:[
    {title:"The 4-Part Video Structure",body:"Every performing video follows a structure:\n\n1. HOOK (0-3 sec): Stop the scroll\n2. SETUP (3-15 sec): What this is about, why it matters\n3. VALUE (15-45 sec): The actual content, tip, or story\n4. CTA (last 5 sec): What to do next\n\nThat's it. Simple framework. Apply it to every video."},
    {title:"The Setup: Buy Their Attention",body:"After the hook, you have 10 seconds to earn the right to keep talking.\n\nTell them WHAT they will get and WHY it matters to them.\n\n'Because I spent 3 years getting this wrong and I want to save you the same time...'\n\nThis is called the setup. It is a promise — and it keeps them watching to collect on it."},
    {title:"The CTA: Every Video Needs One",body:"Do not end a video without telling your viewer what to do next.\n\nChoose ONE of these:\n- 'Follow for more...'\n- 'Comment below if...'\n- 'Save this for later'\n- 'Share this with a mom who needs it'\n\nOne CTA per video. Not five. One. Make it feel natural, not forced."}
  ],
  tip:"Your CTA is not begging. It is direction. Your audience WANTS to know what to do next. Give them clear direction and they will take it.",
  workshop:{title:"Script Your Next Video",prompt:"Script your next video using the 4-part structure. Film it today.\n>> Your hook (first 3 seconds)\n>> Your setup (why this matters to your audience)\n>> Your 3 main value points\n>> Your call to action"}
},
"c5m2":{
  intro:{headline:"Captions That Drive Saves and Shares",sub:"Captions are the secret weapon most creators ignore. Do not be most creators."},
  points:[
    {title:"Why Captions Matter",body:"Saves and shares are the highest-value engagement signals on Instagram and TikTok.\n\nSaves = 'this is useful, I'll come back to it'\nShares = 'this is so good/relatable I need someone else to see it'\n\nBoth of these MASSIVELY signal the algorithm to push your content to more people.\n\nCaption writing is how you trigger saves and shares."},
    {title:"Caption Formulas That Work",body:"Formula 1 — STORY: Hook + relatable story + lesson + CTA\n\nFormula 2 — LIST: Hook + 5 useful tips + save reminder\n\nFormula 3 — QUESTION: Ask a relatable question your audience will want to answer\n\nFormula 4 — CONFESSION: Start with 'Real talk:...'  or 'Unpopular opinion:...' — vulnerability drives shares."},
    {title:"The Save-Worthy Caption",body:"A caption gets saved when it has:\n✓ Practical information people want to reference again\n✓ A list or steps they will use later\n✓ An emotional truth they want to keep\n\nTry ending a caption with: 'Save this for the next time you need a reminder that...'\n\nThat single line increased saves for creators by 30-50%."}
  ],
  tip:"Write captions as if you're texting your best friend — but a best friend who also happens to know everything about your topic. That tone converts.",
  workshop:{title:"Write 3 Captions",prompt:"Write 3 captions for your next 3 posts using the formulas.\n>> Caption 1 using the story formula\n>> Caption 2 using the list formula\n>> Caption 3 using the vulnerability or confession formula"}
},
"c5m3":{
  intro:{headline:"Understanding the Algorithm (Simply)",sub:"The algorithm is not your enemy. Here is what it actually rewards."},
  points:[
    {title:"What the Algorithm Actually Wants",body:"Every social media algorithm wants the same thing: to keep people on the app as long as possible.\n\nSo it rewards creators whose content makes people:\n- STOP scrolling (hook)\n- WATCH all the way through (retention)\n- ENGAGE (like, comment, save, share)\n- COME BACK (consistent posting)\n\nCreate content that does those 4 things. The algorithm will find your people."},
    {title:"The Metrics That Matter",body:"Focus on these in this order:\n\n1. Watch time / completion rate (most important)\n2. Saves (high-quality signal)\n3. Shares (highest-quality signal)\n4. Comments (shows community)\n5. Likes (least important, but still counts)\n\nDo NOT obsess over follower count. Focus on content quality and consistency."},
    {title:"The Consistency Compound",body:"Here is what most creators do not understand: the algorithm rewards CONSISTENT creators.\n\nPosting 1x per day for 60 days > posting 5x per day for 2 weeks then disappearing.\n\nPick a sustainable posting schedule and commit to it. 3-5x per week is plenty if the content is good."}
  ],
  tip:"The algorithm is just a machine trying to show people content they will like. Make content people genuinely like, and the algorithm becomes your biggest distributor.",
  workshop:{title:"Audit Your Last 10 Posts",prompt:"Look at your last 10 posts and find the patterns.\n>> What did your top performing posts have in common?\n>> What content type gets the most saves and shares from your audience?\n>> One specific change you are making starting with your next post"}
},
// ── COURSE 6: Land Brand Deals ──
"c6m0":{
  intro:{headline:"You Can Start Pitching at Any Follower Count",sub:"Brand deals are not reserved for people with 100K followers. Here is the truth.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"The Micro-Influencer Advantage",body:"Brands are actively moving toward micro and nano influencers (1K-50K followers) because:\n\n- Higher engagement rates\n- More authentic recommendations\n- More affordable for budget-conscious brands\n- Stronger community trust\n\nYour size is not your limitation. It might actually be your competitive advantage."},
    {title:"What Brands Are Actually Looking For",body:"Before a brand says yes, they check:\n✓ Engagement rate (not follower count)\n✓ Content quality (is it on brand?)\n✓ Audience alignment (do her followers match our customer?)\n✓ Professionalism (is her pitch clear? Does she have a media kit?)\n\nFocus on these four things. They are all within your control."},
    {title:"Finding Brands That Are a Good Fit",body:"Start with brands you already USE. This is non-negotiable.\n\nWhy? Because:\n1. Your pitch will be authentic\n2. Your content will convert\n3. You will be easier to work with\n4. Long-term partnerships are more likely\n\nMake a list of 10 brands you genuinely use and love right now."}
  ],
  tip:"The best brand deal you can land is with a brand you are already recommending for free. You are currently giving them marketing they are not paying for. That ends now.",
  workshop:{title:"Your Brand Hit List",prompt:"Write your brand hit list of 10 brands to pitch.\n>> 5 brands I already use daily or weekly\n>> 3 services or apps I would recommend to other moms\n>> 2 dream brand partnerships I would love"}
},
"c6m1":{
  intro:{headline:"The Pitch Email That Gets a Yes",sub:"The exact framework for a pitch that converts."},
  points:[
    {title:"The 5-Line Pitch Formula",body:"Subject: Creator Partnership Inquiry — [Your Name]\n\nLine 1: Who you are + your niche in one sentence\nLine 2: Why you love THIS brand specifically (be specific)\nLine 3: Your audience and why they are their customer\nLine 4: What you are proposing\nLine 5: Next step (media kit attached, open to discuss)\n\nThat is it. Short. Clear. Confident."},
    {title:"What NOT to Do",body:"✗ Do not apologize for your follower count\n✗ Do not use a generic template they can tell is copy-paste\n✗ Do not write 3 paragraphs before getting to the point\n✗ Do not say 'I think I would be a great fit' (say 'I AM a great fit, here's why')\n✗ Do not follow up more than twice\n\nYour pitch is a business communication. Treat it like one."},
    {title:"Where to Send It",body:"Finding brand emails:\n1. Go to their website → scroll to footer → look for 'press', 'partners', or 'contact'\n2. Google: '[Brand name] influencer marketing email'\n3. LinkedIn: search the brand and find their marketing manager\n4. Instagram DM: 'Hi! I sent an email to [email] — just wanted to make sure you received it'\n\nMost brands respond to email. DM is a good backup."}
  ],
  tip:"Brands get hundreds of generic 'I love your brand' pitches. Be specific. Name the exact product you use, the exact reason you love it, and the exact audience you will put it in front of. Specific = professional.",
  workshop:{title:"Write Your First Pitch Email",prompt:"Write your first pitch email using the 5-line formula. Send it today.\n>> The brand you are pitching\n>> Your complete 5-line pitch email\n>> The date and time you will send it"}
},
"c6m2":{
  intro:{headline:"Negotiating Your Rate With Confidence",sub:"You set the rate. You hold the rate. Here is how."},
  points:[
    {title:"Know Your Numbers Before You Pitch",body:"Go into every pitch knowing exactly what you charge.\n\nHave a rate card:\n- UGC video only (no posting): $150-400\n- Story feature: $100-300\n- Feed post: $200-600\n- TikTok video: $200-600\n- Full campaign package: negotiate based on scope\n\nYour rate goes UP as your stats improve. Review every 3 months."},
    {title:"When They Say 'We Only Have a Small Budget'",body:"This is a negotiation tactic. You have options:\n\n1. Hold your rate: 'I understand — this is my current rate for this deliverable.'\n2. Adjust deliverables: 'For that budget, I can offer one story instead of a feed post.'\n3. Counter offer: 'I can do it for $X — would that work?'\n\nWhat you should NEVER do: drastically drop your rate because they pushed back once."},
    {title:"The Value of Saying No",body:"Not every brand deal is worth taking.\n\nBefore saying yes, ask:\n✓ Does this brand align with my values?\n✓ Would my audience actually use this?\n✓ Am I being paid fairly for my time?\n✓ Does this help or hurt my brand long-term?\n\nSaying no to a bad deal protects your credibility and makes room for a great one."}
  ],
  tip:"The moment you accept less than you're worth, you train brands to undervalue you. Hold your rate. The right brands will pay it.",
  workshop:{title:"Build Your Rate Card",prompt:"Build your rate card right now.\n>> My rate for a single feed post or TikTok video\n>> My rate for a story post\n>> My rate for a UGC video with no posting required\n>> My rate for a bundle package"}
},
"c6m3":{
  intro:{headline:"Contracts, Deliverables, and Getting Paid",sub:"Protect yourself. Every brand deal needs a clear agreement."},
  points:[
    {title:"Always Get It in Writing",body:"Whether it is a formal contract or a detailed email thread — always have a written record of:\n✓ What you are creating (exact deliverables)\n✓ When it is due\n✓ How much you are being paid\n✓ When you are being paid\n✓ How many revision rounds are included\n\nNo written agreement = no deal. Always."},
    {title:"Deliverables to Clarify Upfront",body:"Before you start creating, confirm:\n- Video length and format\n- Required talking points or key messages\n- Hashtags and mentions required\n- Posting date and time\n- Content approval process (do they review before you post?)\n- Usage rights (can they reuse your content?)\n\nClear deliverables = happy brand relationship + repeat work."},
    {title:"Getting Paid and Follow-Through",body:"Payment terms to request:\n- 50% upfront, 50% on delivery (for new brands)\n- Net-30 (payment within 30 days of delivery) is industry standard\n\nAfter delivery:\n✓ Send your analytics 72 hours after posting\n✓ Check in with the brand about results\n✓ Ask if they want to continue the partnership\n\nThat follow-through is how you turn one deal into a long-term relationship."}
  ],
  tip:"One brand deal done well is worth ten mediocre ones. Show up, deliver what you promised, and communicate professionally. Repeat clients are the best clients.",
  workshop:{title:"Your Brand Deal Checklist",prompt:"Create your brand deal checklist and save it.\n>> What written agreement I will require for every deal\n>> My payment terms (when and how I expect to be paid)\n>> How I will follow up after delivery to build the long-term relationship"}
},
// ── COURSE 7: UGC ──
"c7m0":{
  intro:{headline:"What Is UGC and Why Brands Are Paying For It",sub:"No following required. This is the fastest way to get paid as a new creator.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"UGC = User Generated Content",body:"UGC is content you create FOR a brand — but you never post it to your own account.\n\nThe brand uses it in their ads, on their website, or in their social media.\n\nYou are paid as a content creator, not as an influencer. Your follower count does not matter at all."},
    {title:"Why Brands NEED UGC",body:"Brands have found that authentic-looking content (like what a real person would film on their phone) outperforms polished studio ads by 2-3x.\n\nSo they hire creators to make that content.\n\nThe market for UGC creators is massive — and most moms do not know it exists yet."},
    {title:"What UGC Work Looks Like",body:"Typical UGC jobs:\n- Film a product review in your kitchen\n- Create a 'how I use this' short video\n- Film a testimonial-style clip\n- Make a 'before and after' video\n\nThey send the product (or you buy it and get reimbursed). You film. You send the file. You get paid.\n\nStarting rates: $150-400 per video."}
  ],
  tip:"UGC is the fastest way to make your first money as a creator because you skip the part where you need thousands of followers. Your phone and your face are all you need.",
  workshop:{title:"Find Your First UGC Opportunity",prompt:"Go to Collabstr.com right now and create your free creator profile.\n>> My UGC creator bio (2-3 sentences about your niche and what you create)\n>> My starting rate for one UGC video\n>> Link to your Collabstr profile once created"}
},
"c7m1":{
  intro:{headline:"Building a UGC Portfolio From Scratch",sub:"No paid work yet? No problem. Here is how to build your portfolio today."},
  points:[
    {title:"Spec Work: Your Portfolio Launchpad",body:"Spec work = content you create for a brand without being hired.\n\nHow: Pick 3 products you already own and use. Film 30-60 second videos as if you were hired by each brand.\n\nPost them on your social accounts or just use them as portfolio pieces.\n\nThis gives you 3 samples to show potential clients immediately."},
    {title:"What Makes a Strong UGC Sample",body:"Good UGC content has:\n✓ Clear audio (no background noise)\n✓ Good lighting (face a window)\n✓ A natural, conversational delivery\n✓ A clear product demo or benefit shown\n✓ Authentic emotion — excitement, surprise, satisfaction\n\nBrands want to feel like a real person genuinely loves their product. Be that real person."},
    {title:"Organizing Your Portfolio",body:"Create a simple Google Drive folder with your UGC samples.\n\nLabel them: [Your Name] — [Product Type] — UGC Sample\n\nWhen pitching to brands or applying on platforms, you will share this link.\n\nYou do not need a fancy website. A clean Google Drive is completely professional."}
  ],
  tip:"Your first 3 UGC samples do not have to be perfect. They have to exist. Done beats perfect every single time.",
  workshop:{title:"Create 3 UGC Samples",prompt:"Choose 3 products you own right now and plan a UGC video for each. Film at least one this week.\n>> Product 1 and my opening hook line for the video\n>> Product 2 and the benefit I will highlight\n>> Product 3 and the emotion I want to capture"}
},
"c7m2":{
  intro:{headline:"How to Price Your UGC Services",sub:"Know your worth, charge your worth, and never apologize for it."},
  points:[
    {title:"UGC Pricing Tiers",body:"Starter (no portfolio yet): $100-200 per video\nGrowing (3-10 samples): $200-400 per video\nEstablished (consistent work): $400-800 per video\nSpecialty niches (finance, health, legal): charge 20-30% more\n\nThese are starting points. Your rate increases with every successful delivery."},
    {title:"What Affects Your Rate",body:"Factors that increase your rate:\n✓ Turnaround time (rush fee for 24-48 hour delivery)\n✓ Exclusivity (brand wants to use it for ads only)\n✓ Usage rights duration (longer = more expensive)\n✓ Raw files (charge extra)\n✓ Multiple concepts/versions\n\nBundle pricing: 3 videos for 20% discount. This secures more work upfront."},
    {title:"The Confidence Mindset",body:"You are not 'just' making a video. You are saving the brand from:\n- Hiring a production team\n- Studio rental costs\n- Actor fees\n- Multiple hours of editing\n\nA $300 UGC video is a massive deal for the brand. Charge accordingly."}
  ],
  tip:"Price yourself too low and brands assume your work is low quality. Confidence in your rate communicates confidence in your work. Both matter.",
  workshop:{title:"Set Your UGC Rate Card",prompt:"Set your UGC rate card.\n>> My rate for one UGC video up to 60 seconds\n>> My bundle rate for 3 UGC videos\n>> My rush delivery rate for 24 to 48 hour turnaround\n>> My pricing blurb for my Collabstr profile"}
},
"c7m3":{
  intro:{headline:"Finding Clients and Landing Your First Deal",sub:"The clients are out there. Here is how to find them and get them to say yes."},
  points:[
    {title:"Platform-Based Client Finding",body:"Best platforms for UGC work:\n\n1. Collabstr — dedicated UGC marketplace, huge brand demand\n2. Billd — brands post UGC campaigns you apply to\n3. Upwork — set up a creator profile for content services\n4. Instagram — DM small to mid-size brands directly\n\nCreate profiles on all four. Apply to 5+ opportunities per week. Consistency wins."},
    {title:"The Cold Outreach Formula",body:"Direct outreach to brands on Instagram:\n\n'Hi [Brand], I'm a UGC creator specializing in [niche]. I made a sample video for your [product] — would you like to see it?'\n\nDo NOT send the video unsolicited. Do NOT pitch rates in the first message.\n\nGet a 'yes, send it over' first. Then send your sample AND your rate card."},
    {title:"Getting Rehired",body:"Delivering great UGC once is how you get paid. Making it easy for the brand to rehire you is how you build income.\n\nAfter delivery:\n✓ Deliver on time or early\n✓ Provide 2-3 versions without being asked\n✓ Send a follow-up asking about next steps\n✓ Suggest future content ideas\n\nOne happy brand becomes a monthly retainer. That is real income stability."}

"c8m0":{
  intro:{headline:"Create Once, Earn Forever",sub:"Digital products are the most scalable income stream a mom creator can build.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"Why Digital Products Are Perfect for Moms",body:"Digital products — ebooks, templates, guides, mini-courses, printables — are created once and sold unlimited times.\n\nNo inventory. No shipping. No physical product. Someone buys at 2am and the money hits your account while you are sleeping.\n\nFor moms with limited time, this is the most efficient income stream that exists."},
    {title:"What Should YOU Create?",body:"The best digital product is the answer to a question your audience already asks you.\n\nLook at your DMs and comments. What do people ask you most?\n\nIf you are a fitness mom: a 30-day beginner workout guide.\nIf you are a budget mom: a grocery meal plan template.\nIf you are a style mom: a capsule wardrobe guide.\nIf you are a faith mom: a daily devotional journal.\n\nYou already have the expertise. Package it."},
    {title:"You Do Not Need a Big Audience to Start",body:"Digital products work at every follower count because you are not selling based on reach — you are selling based on value.\n\nA creator with 500 highly engaged followers can out-sell one with 50,000 disengaged ones every time.\n\nStart with one product. Price it between $7 and $47. Test it with your existing audience. Then build from there."}
  ],
  tip:"You are already giving away your best knowledge for free every day in your content. A digital product just packages that knowledge so you can get paid for it too.",
  workshop:{title:"Your Digital Product Idea",prompt:">> What is the most common question your audience asks you?\n>> What problem do you solve for moms that they would pay to have solved faster?\n>> Your first digital product idea and what it would include\n>> What price feels right for your audience (be specific)"}
},
"c8m1":{
  intro:{headline:"What to Create for Your Niche",sub:"The right product for your specific audience already exists in your head. Let's pull it out."},
  points:[
    {title:"Match Product to Audience Pain",body:"The best-selling digital products solve a specific, urgent problem.\n\nNot: \'A guide to healthy living\'\nBut: \'A 2-week dinner plan for moms who hate meal prepping\'\n\nThe more specific, the more it converts. Specific products feel like they were made exactly for the buyer."},
    {title:"Digital Product Formats That Sell",body:"Ranked by ease of creation:\n\n1. PDF Guide or Ebook — write it in Canva or Google Docs\n2. Canva Template Pack — design templates your audience can customize\n3. Printable Planner or Worksheet — one page, huge value\n4. Email Challenge — 5 or 7 day email series\n5. Mini Video Course — 3 to 5 short recorded lessons\n\nStart with a PDF. It takes a weekend and can earn for years."},
    {title:"How Long Does It Take?",body:"A simple PDF guide: one focused weekend.\nA Canva template pack: 2 to 3 days.\nA printable planner: 4 to 8 hours.\nA mini-course: 1 to 2 weeks.\n\nDone is better than perfect. Your first product will not be your best product. It will be the one that teaches you what your audience actually wants more of."}
  ],
  tip:"Your first product does not have to be your magnum opus. It has to exist. Ship it, learn from it, and make the next one better.",
  workshop:{title:"Design Your First Product",prompt:">> The specific problem my product will solve\n>> The format I will create it in (PDF, template, planner, mini-course)\n>> The title of my product\n>> Everything it will include (list the sections or components)\n>> My target completion date"}
},
"c8m2":{
  intro:{headline:"Create Your Product in Canva",sub:"You do not need design skills. You need Canva and a free afternoon."},
  points:[
    {title:"Canva Is Your Digital Product Studio",body:"Canva has free templates for ebooks, guides, planners, workbooks, and presentations.\n\nSearch Canva for your product type, choose a clean professional template, change the colors to match your brand, and add your content.\n\nThat is literally the process. No design degree required."},
    {title:"Making It Look Professional",body:"Three things make a Canva product look premium:\n\n1. Consistent colors — stick to 2 to 3 brand colors throughout\n2. Clean readable fonts — one font for headings, one for body text\n3. White space — do not cram every page. Space = sophistication.\n\nAdd your logo or brand name on every page. Export as PDF. Done."},
    {title:"What to Include in Your Product",body:"Structure your product like this:\n\nCover page — your product title and a strong visual\nIntroduction — who this is for and what they will get\nMain content — your lessons, guides, templates, or plans\nBonus — a quick win or resource they did not expect\nNext steps — what to do after reading + link to your other content\n\nThat structure works for any digital product in any niche."}

  tip:"Open Canva right now. Search for your product type. Pick a template. Start filling it in. You will be surprised how far you get in one hour.",
  workshop:{title:"Start Building in Canva",prompt:"Open Canva right now and start your product. Then come back and answer:\n>> Which Canva template did you choose?\n>> What are the main sections of your product?\n>> What is the one thing that will make your product better than anything else out there on this topic?"}

"c8m3":{
  intro:{headline:"Pricing, Selling, and Setting Up Passive Income",sub:"The product is built. Now let's get it in front of buyers."},
  points:[
    {title:"How to Price Your Digital Product",body:"Pricing psychology for digital products:\n\n$7 to $17: Impulse buy. Low barrier. Great for your first product or an add-on.\n$27 to $47: Sweet spot for most mom creators. Perceived as serious value.\n$67 to $97: For comprehensive guides, course workbooks, or template packs.\n$97+: For mini-courses, coaching add-ons, or premium bundles.\n\nDo not underprice. Pricing too low signals low value and attracts people who will not implement it."},
    {title:"Where to Sell It",body:"Easiest platforms to get started:\n\n1. Gumroad — free to start, they take a small cut, very beginner friendly\n2. Payhip — similar to Gumroad, clean checkout experience\n3. Stan Store — popular with creators, links to your bio easily\n4. Your own website — most control, more setup required\n\nStart with Gumroad or Stan Store. Create your product listing. Get your link. Add it to your bio."},
    {title:"How to Market Your Digital Product",body:"You do not need to run ads. Your content IS your marketing.\n\n1. Create content that solves the exact problem your product solves\n2. At the end, say: \'I created a full guide on this — link in bio\'\n3. Post consistently about the topic\n4. Share buyer testimonials and results\n\nEvery piece of content you make is a billboard for your product. You are already doing the marketing — you just need the product to point to."}

    {title:"Where to Find Brand Emails",body:"Finding the right contact:\n\n1. Brand website footer — look for Press, Partners, or Contact.\n2. Google: [Brand name] influencer marketing email.\n3. LinkedIn: search the brand and find their marketing manager.\n4. Instagram DM as a follow-up only.\n\nAlways email first. DM is a backup, not a primary pitch channel."}

"c5m4":{
  intro:{headline:"Repurposing Content Across Platforms",sub:"Create once. Post everywhere. This is how you multiply your reach without multiplying your workload."},
  points:[
    {title:"Why Repurposing Is the Smartest Content Strategy",body:"Most creators start from scratch for every platform. That is exhausting and unnecessary.\n\nOne piece of content can become:\n- A TikTok video\n- An Instagram Reel\n- A YouTube Short\n- A Pinterest pin with the thumbnail\n- A caption turned into a thread\n\nYou are not copying content. You are distributing it. There is a difference."},
    {title:"The Repurposing Formula",body:"Start with your strongest piece — the one that got the most saves, shares, or comments.\n\nStep 1: Post it on your main platform.\nStep 2: Download without watermark (SnapTik for TikTok).\nStep 3: Post natively to the next platform.\nStep 4: Adjust the caption for each platform's tone.\n\nOne video. Four platforms. Four chances to be discovered."},
    {title:"Platform-Specific Tweaks",body:"TikTok: trending audio, text overlays, fast cuts.\nInstagram Reels: slightly longer captions, hashtags.\nYouTube Shorts: add a verbal call to subscribe.\nPinterest: add a static thumbnail with text overlay.\n\nThe core content is the same. The packaging is slightly different. That is the whole strategy."}
  ],
  tip:"Your best content deserves to be seen by more than one platform's audience. Stop leaving reach on the table.",
  workshop:{title:"Build Your Repurposing System",prompt:"Answer these to build your repurposing workflow:\n>> My primary platform where I post first\n>> The two other platforms I will repurpose to\n>> My repurposing day each week (when I will distribute)"}
},
"c6m4":{
  intro:{headline:"Follow-Up and Building Long-Term Brand Relationships",sub:"One brand deal is income. A long-term brand relationship is a salary."},
  points:[
    {title:"The Follow-Up That Gets Remembered",body:"After you deliver your content:\n\nSend the analytics 72 hours after posting.\nThank them genuinely and specifically.\nNote what performed well.\nAsk one question: 'Would you be open to continuing this partnership?'\n\nThat one question turns a one-off deal into a retainer. Most creators never ask it. You will."},
    {title:"Building the Long-Term Relationship",body:"Brands want creators who make their lives easier. Be that creator.\n\nDeliver on time or early.\nCommunicate proactively — never ghost.\nSend content ideas proactively even when not on contract.\nTag them in organic content occasionally between campaigns.\n\nYou are not just a vendor. You are a brand partner. Act like one."},
    {title:"Turning Deals Into Retainers",body:"Propose a retainer after your second successful collaboration:\n\n'I would love to create content for you consistently. Would you be interested in a monthly package? I could offer X deliverables per month for $Y.'\n\nRetainers give you predictable income. Brands love them because they get consistent, authentic content.\n\nThis is how a $400 deal becomes $1,200 per month."}
  ],
  tip:"The follow-up email after a campaign takes 5 minutes and can turn one deal into months of income. Send it every single time.",
  workshop:{title:"Your Follow-Up Plan",prompt:"After your next brand deal, you will:\n>> What analytics I will send and when\n>> How I will ask about continuing the partnership\n>> My retainer proposal: X posts per month for $Y per month"}
},
"c7m4":{
  intro:{headline:"Delivering UGC That Gets You Rehired",sub:"Good UGC gets you paid once. Great UGC gets you a long-term client."},
  points:[
    {title:"What Brands Actually Want",body:"When you deliver UGC, brands are evaluating:\n\nDid she follow the brief exactly?\nIs the audio and visual quality professional?\nDoes it feel authentic, not scripted?\nWas it delivered on time?\nWas she easy to work with?\n\nAll five matter equally. Brands rehire creators who score high on all five — not just the ones with the best cameras."},
    {title:"Going Beyond the Brief",body:"The difference between a one-time UGC creator and one who gets constant work:\n\nDelivering 3 versions instead of 1 when asked for 1.\nSending a vertical AND horizontal cut without being asked.\nIncluding a short BTS clip as a bonus.\nWriting suggested captions with the delivery.\n\nNone of these takes more than 20 extra minutes. All of them make you unforgettable."},
    {title:"Building Your UGC Client Base",body:"After every successful delivery:\n\n1. Ask for a short written testimonial.\n2. Ask if they have upcoming campaigns you could be part of.\n3. Ask if they know other brands who work with UGC creators.\n4. Add them to your 'warm client' list for monthly check-ins.\n\nYour goal is 3-5 recurring UGC clients. That is $450 to $2,000 per month in predictable income."}
  ],
  tip:"Treat every UGC job like it is an audition for a retainer. Because it is.",
  workshop:{title:"Your UGC Delivery Checklist",prompt:"Before you submit your next UGC project:\n>> What extras will I include beyond the minimum brief?\n>> My quality checklist: audio clear, lighting good, delivery on brief\n>> How I will ask for a testimonial and future work after delivery"}
},

  intro:{headline:"Selling and Marketing Your Digital Product",sub:"You do not need ads. You need content. You are already doing the marketing."},

    {title:"Your Content IS Your Marketing",body:"Every video you make about the topic your product solves is a free advertisement.\n\nPost content that solves the problem your product addresses.\nAt the end of each video, say: 'I built a full guide on this — link in bio.'\nPost consistently about the topic.\nShare buyer results and testimonials.\n\nYou are already creating the marketing. You just need the product to point to."},
    {title:"Your Launch Week Strategy",body:"Day 1: Post 'I just finished building something for you' — tease it.\nDay 2: Show a behind-the-scenes of your product.\nDay 3: Post a piece of content solving the exact problem your product addresses.\nDay 4: Launch day — post the announcement with the link.\nDay 5: Share a buyer testimonial or result.\nDay 6: FAQ post — answer the most common questions.\nDay 7: Last chance reminder.\n\nSeven days. Seven posts. Real results."},
    {title:"Ongoing Passive Income",body:"After launch week, your product sells on autopilot when:\n\nYour bio link always points to it.\nYou mention it naturally in relevant content — not every video, but consistently.\nYou update it occasionally and announce the update.\nYou bundle it with other products as you create more.\n\nOne product, properly marketed, can generate income for years. That is the power of digital products."}

"c9m2":{
  intro:{headline:"Building Systems That Protect Your Creative Energy",sub:"The creators who last are not the most talented. They are the most organized."},
  points:[
    {title:"Why Systems Beat Motivation",body:"Motivation is a feeling. It comes and goes.\nSystems are structures. They work even on bad days.\n\nThe creator who has a filming day, an editing day, and a posting schedule will always out-create the creator who waits to feel inspired.\n\nYou have built something real. Now protect it with systems that make showing up automatic, not optional."},
    {title:"The Three Systems Every Creator Needs",body:"1. CONTENT SYSTEM: A weekly schedule for planning, filming, and posting. Set it, put it in your calendar, and treat it like a work meeting.\n\n2. PITCH SYSTEM: A weekly habit of sending brand pitches and UGC applications. Even two per week adds up to 100 per year.\n\n3. INCOME TRACKING SYSTEM: Review your numbers every month. What is working? What is not? Where should you put more energy?"},
    {title:"Protecting Your CEO Time",body:"Your most important work — content creation, pitching, strategy — deserves protected time.\n\nThat means:\n- Time-blocking your filming window so it does not get filled with other things.\n- Saying no to commitments that eat into your creative energy during your best hours.\n- Treating your content business with the same respect you would give a second job. Because that is what it is becoming."}
  ],
  tip:"A 15-minute weekly planning session on Sunday will save you hours of stress every single week. Put it in your calendar right now.",
  workshop:{title:"Build Your Creator Systems",prompt:"Design the three systems for your business:\n>> My weekly content system: planning day, filming day, posting days\n>> My weekly pitch habit: how many pitches and when\n>> My monthly income review date and what I will track"}
},
"c9m3":{
  intro:{headline:"Setting Revenue Goals and Scaling Mindfully",sub:"You have income coming in. Now let's grow it intentionally."},
  points:[
    {title:"Know Your Numbers",body:"A creator who does not know her numbers cannot grow intentionally.\n\nTrack every month:\n- Total income from all streams\n- Which stream earned the most\n- Which stream took the most time\n- Your income per hour invested\n\nThe goal is not just more income. It is more income with the same or less effort. That is how you scale without burning out."},
    {title:"The Income Diversification Formula",body:"Sustainable creator income comes from at least three streams:\n\n1. Active income: brand deals, UGC, services you deliver directly.\n2. Semi-passive income: affiliate marketing, ambassador programs.\n3. Passive income: digital products, courses.\n\nStart with active. Add semi-passive. Build passive over time.\n\nWhen you have all three, a slow month on one stream does not panic you because the other two keep going."},
    {title:"When to Scale and What to Add",body:"You are ready to scale when:\n- You have been consistent for 60+ days.\n- You have closed at least one paid deal or made your first product sale.\n- You know which content type performs best for you.\n\nAt that point, raise your rates, pursue bigger brands, add a new income stream, or create a more premium digital product.\n\nEvery level you unlock is built on the foundation you created in this academy."}
  ],
  tip:"Your income goal is not the ceiling. It is the floor. Set it, hit it, and then set a new one.",
  workshop:{title:"Your Income Goals",prompt:"Set your creator income targets:\n>> My income goal for the next 30 days\n>> My income goal for 90 days from now\n>> My three income streams and a target for each\n>> The one thing I will do this week to move closer to my income goal"}
},
"c9m4":{
  intro:{headline:"Making Content Feel Fun Again — Always",sub:"Sustainable success is not built on hustle. It is built on joy."},
  points:[
    {title:"Why Joy Is a Business Strategy",body:"The creators who last the longest are not the ones who grind the hardest.\n\nThey are the ones who genuinely enjoy what they make.\n\nWhen you enjoy your content, it shows. Your audience feels it. They stay longer, engage more, and trust you more deeply.\n\nProtecting your joy is not a luxury. It is a core business decision."},
    {title:"How to Keep Content Fresh",body:"When content starts to feel like a chore:\n\nGo back to your WHY. Why did you start? Who are you helping?\nTry a new format — challenge, collab, day-in-the-life, a topic you have never covered.\nTake a content break for 3-5 days. Recharge without guilt.\nWatch your earliest content and remember how far you have come.\n\nCreativity needs space. Give it some."},
    {title:"The Long Game",body:"You are not building a viral moment. You are building a brand.\n\nBrands are built over months and years — not weeks.\nThe moms who win are the ones who keep showing up after the slow weeks, the low-view videos, and the hard seasons.\n\nYou have the knowledge. You have the tools. You have Evie.\n\nNow go build something that matters."}
  ],
  tip:"On the hard days, remember: the mom scrolling your content at midnight is counting on you to keep showing up. That is who you are doing this for.",
  workshop:{title:"Your Joy Audit",prompt:"Check in with yourself honestly:\n>> What part of creating content brings me the most joy right now?\n>> What feels like a drain and how can I change or reduce it?\n>> One thing I will do this week just because it sounds fun to create\n>> My personal promise to myself about how I will show up going forward"}
},
"c2m4":{
  intro:{headline:"The Story Only You Can Tell",sub:"Your unfair advantage is the life only you have lived."},
  points:[
    {title:"Nobody Can Copy Your Story",body:"Trends come and go. Formats change. The algorithm shifts.\n\nBut your story? Nobody can replicate that.\n\nThe creator who builds content around her real lived experience is impossible to replace. The struggles, the wins, the specific way you see the world — that is your unfair advantage and it is worth real money."},
    {title:"The Authenticity Algorithm",body:"Authentic content performs better because viewers can feel when something is genuinely real.\n\nReal stories get shared. Shares mean growth.\n\nYour specific emotion becomes their specific emotion. That connection is what makes someone hit follow, buy your product, and tell their friends about you."},
    {title:"Mining Your Daily Life for Content",body:"Your life is a content goldmine you are walking past every single day.\n\nThe moment of frustration in the grocery store. The thing your kid said at dinner. The hack that saved your Tuesday.\n\nStart a notes app content diary today. Every real moment is a potential post. The most viral content starts with real life."}
  ],
  tip:"Your audience does not want a perfect creator. They want a real one. Give them real and they will give you loyalty — and loyalty converts to income.",
  workshop:{title:"Your Content Story Bank",prompt:"Write real moments from your life that could become content. Pick one and post it this week.\n>> 3 relatable struggles from your real life right now\n>> 3 wins or lessons you have figured out\n>> 3 daily moments that are funny, real, or honest\n>> Your biggest transformation before vs now"}
},
"c3m4":{
  intro:{headline:"The Batch Filming System for Moms",sub:"Stop creating content every day. Batch it and take your weekends back."},
  points:[
    {title:"Why Batch Filming Changes Everything",body:"Creating content every single day is exhausting and unsustainable for moms. It leads to burnout, inconsistency, and eventually quitting.\n\nBatch filming — recording multiple videos in one focused session — is how creators stay consistent without losing their minds.\n\nOne 2-hour session on a Sunday can produce two full weeks of content. That is the system."},
    {title:"The Simple Batch System",body:"Step 1: Choose 7-14 ideas in advance using your Hook Vault\nStep 2: Set up your one filming spot\nStep 3: Do hair and makeup once\nStep 4: Film all videos back to back — swap outfits between for variety\nStep 5: Schedule a separate editing session later\n\nThat is the entire system. Rinse and repeat every month."},
    {title:"Batch Filming Tips for Moms",body:"Film during nap time, after bedtime, or trade off with your partner for 2 hours.\n\nHave your scripts or bullet points written before you press record — do not freestyle 14 videos.\n\nGive yourself permission to redo takes. Batch filming is efficient, not perfect.\n\nFilm in 2-3 outfit changes so your content looks like different days even if it was all filmed on the same afternoon."}
  ],
  tip:"The moms who stay consistent are not the ones with the most time. They are the ones with the best systems. This is your system.",
  workshop:{title:"Plan Your First Batch Filming Day",prompt:"Fill in your batch filming plan then put it in your actual calendar right now.\n>> Date and time I will batch film\n>> Who is watching the kids during that time\n>> My filming location\n>> My 7 video ideas for that session"}

function buildChat(){

  var bubs = "";

  if(!msgs.length){

      + '<p style="font-size:12px;color:#9a7060;font-weight:700;margin-bottom:10px;text-align:center">What can I help you with today?</p>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      + QUICK.map(function(q){
          return '<button data-qp="'+esc(q.text)+'" style="background:#fff;border:1.5px solid rgba(196,97,74,0.15);border-radius:12px;padding:10px;cursor:pointer;font-size:12px;font-weight:700;color:#3a1e14;text-align:left;font-family:\'Nunito\',sans-serif;line-height:1.4">'+q.text+'</button>';
        }).join('')

  msgs.forEach(function(m, idx){
    if(!m || !m.content) return;
    var isUser = m.role === "user";

    bubs += '<div style="display:flex;align-items:flex-end;gap:7px;margin-bottom:10px;justify-content:'+(isUser?"flex-end":"flex-start")+'">'

      + (isUser
          ? 'background:linear-gradient(135deg,#c4614a,#d4507a);color:#fff;border-bottom-right-radius:3px'

              ? 'background:#fff5f5;color:#1a0d08;border-bottom-left-radius:3px;border:1px solid rgba(196,97,74,0.2)'
              : 'background:#fff;color:#1a0d08;border-bottom-left-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,0.06)'))
      + '">'
      + m.content.split("\n").join("<br/>")
      + (isError ? '<br/><button data-retry="1" style="margin-top:8px;background:#c4614a;color:#fff;border:none;border-radius:10px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:\'Nunito\',sans-serif">Tap to retry</button>' : '')
      + '</div></div>';
  });

  if(state.loading){
    bubs += '<div style="display:flex;align-items:flex-end;gap:7px;margin-bottom:10px">'
      + avC(26)
      + '<div style="background:#fff;padding:12px 16px;border-radius:16px;border-bottom-left-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,0.06)">'
      + '<span class="dot"></span><span class="dot"></span><span class="dot"></span>'
      + '</div></div>';
  }

  var sendDisabled = state.loading ? 'opacity:.4;pointer-events:none' : 'opacity:1';

  return '<div style="display:flex;flex-direction:column;height:calc(100vh - 130px)">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(135deg,rgba(249,236,230,.9),rgba(253,232,240,.9));border-bottom:1px solid rgba(196,97,74,.1)">'
    + '<div style="display:flex;align-items:center;gap:10px">'
    + avC(38)
    + '<div><div style="font-family:\'Playfair Display\',serif;font-size:15px;color:#1a0d08">Hey Evie</div>'
    + '<div style="font-size:10px;color:#7a4a3a;display:flex;align-items:center;gap:4px">'
    + (state.loading
        ? '<span style="width:5px;height:5px;background:#f0a030;border-radius:50%;display:inline-block"></span>Thinking…'
        : '<span style="width:5px;height:5px;background:#4caf85;border-radius:50%;display:inline-block"></span>Online')
    + '</div></div></div>'
    + (msgs.length > 1 ? '<button id="clear-chat" style="background:none;border:none;color:#b8a090;font-size:11px;cursor:pointer;font-family:\'Nunito\',sans-serif;font-weight:700">Clear</button>' : '')
    + '</div>'
    + '<div id="msg-list" style="flex:1;overflow-y:auto;padding:14px 12px">'
    + bubs
    + '<div id="chat-bottom"></div></div>'
    + '<div style="display:flex;gap:7px;padding:9px 12px;background:'+BG+';border-top:1px solid rgba(196,97,74,.08)">'
    + '<input id="chat-input" style="flex:1;padding:11px 14px;background:#fff;border:1.5px solid rgba(196,97,74,.18);border-radius:20px;font-size:14px;color:#1a0d08;outline:none;font-family:\'Nunito\',sans-serif" placeholder="Ask Evie anything\u2026" value="'+esc(state.input||'')+'"/>'
    + '<button id="send-btn" style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#c4614a,#d4507a);border:none;cursor:pointer;font-size:16px;color:#fff;flex-shrink:0;'+sendDisabled+'">&#10140;</button>'
    + '</div></div>';
}

// ─── Lesson Slides (PowerPoint style) ───
function buildModuleSlides(p){
  var c=state.activeCourse;
  if(!c){state.activeModule=null;state.activeModuleIdx=null;render();return "";}
  var mods=getMods(c,p.niche||"Mom Lifestyle");
  var modTitle=mods[state.activeModuleIdx]||"Module";
  var slideKey="c"+c.id+"m"+state.activeModuleIdx;
  var slideData=MODULE_SLIDES[slideKey]||MODULE_SLIDES["default"];
  var allSlides=buildSlideList(slideData,modTitle,slideKey,c.id);
  var total=allSlides.length;var si=Math.min(state.slideIdx,total-1);
  var slide=allSlides[si];
  var noteText=state.moduleNotes[slideKey]||"";
  var wsKey=slideKey;var wsAnswers=state.workshopAnswers[wsKey]||{};
  var tabNames=["Lesson","Notes","Workshop"];
  return '<div style="flex:1;overflow-y:auto;padding:0 0 100px">'
    +'<div style="padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(196,97,74,.08);background:'+BG+';position:sticky;top:0;z-index:10">'
    +'<button id="back-module" style="background:none;border:none;font-size:16px;cursor:pointer;color:#c4614a;padding:0">←</button>'
    +'<div style="flex:1;min-width:0"><p style="font-size:10px;color:#9a7060;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.title)+'</p>'
    +'<p style="font-size:13px;font-weight:700;color:#1a0d08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(modTitle)+'</p></div>'

    +'</div>'
    +'<div style="display:flex;border-bottom:1px solid rgba(196,97,74,.1);background:#fff">'
    +tabNames.map(function(t,i){var active=state.lessonTab===t.toLowerCase();return '<button data-ltab="'+t.toLowerCase()+'" style="flex:1;padding:10px 0;font-size:12px;font-weight:800;color:'+(active?"#c4614a":"#b0a0a0")+';background:none;border:none;border-bottom:2px solid '+(active?"#c4614a":"transparent")+';cursor:pointer;font-family:\'Nunito\',sans-serif">'+t+'</button>';}).join('')
    +'</div>'
    +(state.lessonTab==="lesson"?buildLessonSlide(allSlides,si,total,slideKey):'')
    +(state.lessonTab==="notes"?buildNotesTab(slideKey,noteText,modTitle):'')
    +(state.lessonTab==="workshop"?buildWorkshopTab(slideData,wsKey,wsAnswers):'')
    +'</div>';
}

function buildSlideList(data,title,key,courseId){
  var slides=[];
  slides.push({type:"intro",data:data.intro||{headline:title,sub:""}});
  (data.points||[]).forEach(function(pt,i){slides.push({type:"point",data:pt,idx:i});});
  if(data.tip)slides.push({type:"tip",data:{tip:data.tip}});
  slides.push({type:"workshop",data:data.workshop||{title:"Reflection",prompt:"What did you learn?"}});
  return slides;
}

function buildLessonSlide(slides,si,total,key){
  var s=slides[si];var html="";
  if(s.type==="intro"){
    var ytId = s.data.youtubeId || "";
    var isRealVideo = ytId && ytId.length > 5 && ytId.indexOf("YOUR_") < 0;
    var videoHtml = isRealVideo ? '<div style="margin:14px 14px 0"><div style="background:#000;border-radius:14px;overflow:hidden;position:relative;padding-top:56.25%"><iframe src="https://www.youtube.com/embed/'+ytId+'?rel=0" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border:none"></iframe></div><p style="font-size:11px;color:#9a7060;text-align:center;margin-top:6px;margin-bottom:0">Watch Simone walk you through this module</p></div>' : "";
    html=videoHtml+'<div class="slide-intro" style="margin:14px"><div style="margin-bottom:auto"><p style="font-size:10px;font-weight:900;color:rgba(196,97,74,.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px">Module Lesson</p>'
      +'<h2 style="font-family:\'Playfair Display\',serif;font-size:26px;color:#fff;margin-bottom:12px;line-height:1.3">'+esc(s.data.headline)+'</h2>'
      +'<p style="font-size:14px;color:rgba(255,255,255,.65);line-height:1.65">'+esc(s.data.sub)+'</p></div>'
      +'<div style="margin-top:24px"><p style="font-size:11px;color:rgba(255,255,255,.4)">Slide 1 of '+total+' · Tap → to continue</p></div></div>';
  } else if(s.type==="point"){
    html='<div style="padding:14px"><div class="slide-point">'
      +'<p style="font-size:10px;font-weight:900;color:#c4614a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Key Point '+(s.idx+1)+'</p>'
      +'<h3 style="font-family:\'Playfair Display\',serif;font-size:20px;color:#1a0d08;margin-bottom:10px;line-height:1.3">'+esc(s.data.title)+'</h3>'
      +'<p style="font-size:14px;color:#3a1e14;line-height:1.75">'+esc(s.data.body)+'</p></div></div>';
  } else if(s.type==="tip"){
    html='<div style="padding:14px"><div class="slide-tip">'
      +'<p style="font-size:10px;font-weight:900;color:#c4614a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Evie\'s Tip ✦</p>'
      +'<p style="font-family:\'Playfair Display\',serif;font-size:17px;color:#1a0d08;line-height:1.7;font-style:italic">"'+esc(s.data.tip)+'"</p></div></div>';
  } else if(s.type==="workshop"){
    html='<div style="padding:14px"><div class="slide-action">'
      +'<p style="font-size:10px;font-weight:900;color:rgba(196,97,74,.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Module Complete!</p>'
      +'<h3 style="font-family:\'Playfair Display\',serif;font-size:19px;color:#fff;margin-bottom:8px">Up next: Workshop Activity</h3>'
      +'<p style="font-size:13px;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:14px">Head to the Workshop tab to complete your activity and lock in what you learned.</p>'
      +'<button id="mark-done" style="background:linear-gradient(135deg,#c4614a,#d4507a);color:#fff;border:none;border-radius:16px;padding:10px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:\'Nunito\',sans-serif">'+(state.learnProgress[key]?"✓ Marked Complete":"Mark as Complete")+'</button>'
      +'</div></div>';
  }
  var dotsHtml='<div style="display:flex;gap:5px;padding:12px 14px 8px;justify-content:center">'
    +slides.map(function(_,i){return '<div style="width:6px;height:6px;border-radius:50%;background:'+(i===si?"#c4614a":"rgba(196,97,74,.2)")+'"></div>';}).join('')+'</div>';
  var navHtml='<div style="display:flex;justify-content:space-between;padding:0 14px 14px;gap:10px">'
    +(si>0?'<button id="slide-prev" style="flex:1;padding:10px;background:#fff;border:1.5px solid rgba(196,97,74,.2);border-radius:18px;color:#c4614a;font-size:13px;font-weight:800;cursor:pointer;font-family:\'Nunito\',sans-serif">← Prev</button>':'<div style="flex:1"></div>')
    +(si<total-1?'<button id="slide-next" style="flex:1;padding:10px;background:linear-gradient(135deg,#c4614a,#d4507a);border:none;border-radius:18px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:\'Nunito\',sans-serif">Next →</button>':'<div style="flex:1"></div>')

  return dotsHtml+html+navHtml;

function buildWeekPicker(p,wStart){
  var niche=p.niche||"Mom Lifestyle";
  var ideas=WEEKLY_IDEAS[niche]||WEEKLY_IDEAS["Mom Lifestyle"];
  var html='<div style="background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;border:1.5px solid #c4614a">'
    +'<p style="font-size:11px;font-weight:900;color:#c4614a;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Evie&#39;s Weekly Content Picks<'
    +'<p style="font-size:12px;color:#9a7060;margin-bottom:14px">Tap a day to assign an idea, or tap an idea to swap it out.</p>';
  DAYS_OF_WEEK.forEach(function(day,i){
    var dt=new Date(wStart);dt.setDate(wStart.getDate()+i);
    var key=dt.toISOString().split("T")[0];
    var existing=state.calPosts[key];
    var selected=state.weekPickerSelections[key];
    var display=selected||existing||"";
    html+='<div style="margin-bottom:10px">'
      +'<p style="font-size:11px;font-weight:800;color:#1a0d08;margin-bottom:6px">'+day+' '+dt.getDate()+'</p>';
    if(display){
      html+='<div style="display:flex;align-items:center;gap:8px;background:rgba(196,97,74,.06);border-radius:10px;padding:8px 10px">'
        +'<p style="font-size:12px;color:#1a0d08;flex:1;line-height:1.4">'+esc(display)+'</p>'
        +'<button data-clearpick="'+key+'" style="background:none;border:none;color:#b8a090;font-size:11px;cursor:pointer;font-family:Nunito,sans-serif;flex-shrink:0">&#10005;</button>'
        +'</div>';
    } else {
      html+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
      var shown=ideas.slice(i*2%ideas.length, i*2%ideas.length+3);
      if(shown.length<3) shown=shown.concat(ideas.slice(0,3-shown.length));
      shown.forEach(function(idea){
        html+='<button data-pickidea="'+esc(idea)+'" data-pickday="'+key+'" style="background:#fff;border:1px solid rgba(196,97,74,.2);border-radius:20px;padding:5px 10px;font-size:11px;color:#3a1e14;cursor:pointer;font-family:Nunito,sans-serif;text-align:left;line-height:1.4">'+esc(idea.length>40?idea.substring(0,38)+'...':idea)+'</button>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  html+='<div style="display:flex;gap:8px;margin-top:4px">'
    +'<button id="apply-week-picks" style="'+btnP()+'flex:1;font-size:12px;padding:10px 0">Apply to Calendar</button>'

    +'</div>';
  return html+'</div>';
}

function sysPrompt(){
  var p = state.profile || {};

  var stage = p.stage || "growing";
  var goal = p.goal || "grow my following";

}

function sendMsg(text){
  var msg = (typeof text === "string" ? text : (state.input||"")).trim();
  if(!msg || state.loading) return;
  state.input = "";
  var inputEl = document.getElementById("chat-input");
  if(inputEl){ inputEl.value = ""; inputEl.blur(); }

  // Clean message history - only keep valid alternating pairs
  var rawHistory = (state.messages||[]).filter(function(m){
    return m && m.role && typeof m.content === "string" && m.content.length > 0;
  });

  // Ensure proper alternating user/assistant pattern (API requirement)
  var cleanHistory = [];
  var lastRole = null;
  for(var i = 0; i < rawHistory.length; i++){
    var m = rawHistory[i];
    if(m.role !== lastRole){
      cleanHistory.push(m);
      lastRole = m.role;
    }
    // If same role twice in a row, skip the older one
  }
  // Must start with user message
  while(cleanHistory.length > 0 && cleanHistory[0].role !== "user"){
    cleanHistory.shift();
  }
  // Keep last 10 messages max to avoid token limits
  if(cleanHistory.length > 10) cleanHistory = cleanHistory.slice(cleanHistory.length - 10);

  var newUserMsg = {role:"user", content:msg};
  var apiMessages = cleanHistory.concat([newUserMsg]).map(function(m){
    return {role: m.role === "user" ? "user" : "assistant", content: String(m.content)};
  });

  state.messages = cleanHistory.concat([newUserMsg]);
  state.loading = true;
  render();

  var bottom = document.getElementById("chat-bottom");
  if(bottom) setTimeout(function(){ bottom.scrollIntoView({behavior:"smooth"}); }, 50);

  var controller = null;
  var timeoutId = null;

  try { controller = new AbortController(); } catch(e){}

  // 25 second timeout
  if(controller){
    timeoutId = setTimeout(function(){
      try{ controller.abort(); }catch(e){}
    }, 25000);
  }

  var fetchOptions = {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 600,
      system: sysPrompt(),
      messages: apiMessages
    })
  };
  if(controller) fetchOptions.signal = controller.signal;

  fetch("/api/chat", fetchOptions)
  .then(function(r){
    if(timeoutId) clearTimeout(timeoutId);
    if(!r.ok){
      return r.json().then(function(errData){
        throw new Error(errData.error ? errData.error.message : "Status " + r.status);
      }).catch(function(){ throw new Error("Status " + r.status); });
    }
    return r.json();
  })
  .then(function(data){
    var reply = "";
    if(data && data.content && data.content[0] && data.content[0].text){
      reply = data.content[0].text;
    } else {
      reply = "Something went sideways on my end! Tap send again. \u2665";
    }
    state.messages = state.messages.concat([{role:"assistant", content:reply}]);
    state.loading = false;
    ss("ev_msgs", state.messages);
    render();
    var b2 = document.getElementById("chat-bottom");
    if(b2) setTimeout(function(){ b2.scrollIntoView({behavior:"smooth"}); }, 50);
  })
  .catch(function(err){
    if(timeoutId) clearTimeout(timeoutId);
    var errMsg = "";
    if(err && err.name === "AbortError"){
      errMsg = "That took too long \u2014 my connection timed out. Try again, I\u2019m here! \u2665";
    } else if(err && err.message && err.message.indexOf("rate") >= 0){
      errMsg = "I\u2019m getting a lot of messages right now! Wait a few seconds and try again. \u2665";
    } else if(!navigator.onLine){
      errMsg = "Looks like you\u2019re offline! Check your wifi or data and I\u2019ll be right here. \u2665";
    } else {
      errMsg = "Lost my connection for a second! Just tap send again. \u2665";
    }
    state.messages = state.messages.concat([{role:"assistant", content:errMsg}]);
    state.loading = false;
    render();
  });
}
